<!doctype html>
<html data-theme="light" data-color-scheme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="application-name" content="PanAI" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PanAI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#4E5969" />
    <link rel="icon" type="image/png" href="./pwa/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa/icon-180.png" />
    <title>PanAI</title>
    <script>
      // Synchronously restore theme from localStorage to prevent theme flash
      (function () {
        try {
          var theme = localStorage.getItem('__panai_theme');
          var colorScheme = localStorage.getItem('__panai_colorScheme');
          if (theme) {
            document.documentElement.setAttribute('data-theme', theme);
          }
          if (colorScheme) {
            document.documentElement.setAttribute('data-color-scheme', colorScheme);
          }
        } catch (e) {}
      })();

      window.__panaiShowBootError = function (message) {
        try {
          var root = document.getElementById('root');
          if (!root) return;
          root.innerHTML =
            '<div class="panai-boot panai-boot-error"><div class="panai-boot-card"><strong>PanAI 启动失败</strong><p>' +
            String(message || '未知错误')
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;') +
            '</p></div></div>';
        } catch (e) {}
      };
      window.addEventListener('error', function (event) {
        window.__panaiShowBootError(event.message || '资源加载失败');
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason;
        window.__panaiShowBootError((reason && (reason.message || reason.toString())) || '启动任务失败');
      });
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      .panai-boot {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background: #f7f8fa;
        color: #1d2129;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .panai-boot-card {
        display: flex;
        min-width: 260px;
        max-width: 560px;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 28px 32px;
        border: 1px solid #e5e6eb;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 16px 48px rgb(29 33 41 / 10%);
        text-align: center;
      }
      .panai-boot-mark {
        width: 34px;
        height: 34px;
      }
      .panai-boot-title {
        font-size: 16px;
        font-weight: 650;
      }
      .panai-boot-error .panai-boot-card {
        align-items: flex-start;
        text-align: left;
      }
      .panai-boot-error p {
        max-height: 240px;
        margin: 0;
        overflow: auto;
        color: #4e5969;
        font-size: 12px;
        line-height: 1.5;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <script>
      // Set arco-theme on body synchronously
      try {
        var t = localStorage.getItem('__panai_theme');
        if (t) document.body.setAttribute('arco-theme', t);
      } catch (e) {}
    </script>
    <div id="root">
      <div class="panai-boot">
        <div class="panai-boot-card">
          <svg class="panai-boot-mark" viewBox="0 0 28 28" aria-hidden="true">
            <polygon points="14,0 17.5,8.2 26.4,1.6 19.8,10.5 28,14 19.8,17.5 26.4,26.4 17.5,19.8 14,28 10.5,19.8 1.6,26.4 8.2,17.5 0,14 8.2,10.5 1.6,1.6 10.5,8.2" fill="#FFC53D" />
            <circle cx="14" cy="14" r="7.2" fill="#FFE8A3" />
          </svg>
          <div class="panai-boot-title">PanAI 正在启动</div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
