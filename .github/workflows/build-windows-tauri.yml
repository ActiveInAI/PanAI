name: Build Windows EXE (Tauri)

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch or tag to build
        required: true
        default: main
        type: string

env:
  BUN_INSTALL_REGISTRY: https://registry.npmjs.org/

jobs:
  build-windows-exe:
    name: Build Windows x64 EXE
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust target
        shell: pwsh
        run: rustup target add x86_64-pc-windows-msvc

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: "17.0"

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: bun install --frozen-lockfile

      - name: Run postinstall
        shell: pwsh
        run: bun run postinstall

      - name: Prepare bundled backend
        shell: pwsh
        env:
          PANAI_BACKEND_ARCH: x64
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/prepareAioncore.js

      - name: Build Tauri Windows installer
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          CI: true
        run: bun run build-win:x64

      - name: Smoke test installed EXE
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "No NSIS installer was produced"
          }

          $installDir = Join-Path $env:RUNNER_TEMP "PanAI-smoke"
          if (Test-Path $installDir) {
            Remove-Item -Recurse -Force $installDir
          }
          New-Item -ItemType Directory -Path $installDir | Out-Null

          $install = Start-Process -FilePath $installer.FullName -ArgumentList "/S", "/D=$installDir" -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "Installer failed with exit code $($install.ExitCode)"
          }

          $exe = Join-Path $installDir "PanAI.exe"
          if (-not (Test-Path $exe)) {
            throw "Installed PanAI.exe not found at $exe"
          }

          $process = Start-Process -FilePath $exe -PassThru
          try {
            $deadline = (Get-Date).AddSeconds(45)
            $healthy = $false
            while ((Get-Date) -lt $deadline) {
              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:13400/health" -TimeoutSec 2
                if ($response.StatusCode -eq 200) {
                  $healthy = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $healthy) {
              throw "PanAI backend health check did not pass after launching installed EXE"
            }
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v6
        with:
          name: PanAI-windows-x64-exe
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip
          if-no-files-found: error
          retention-days: 14
